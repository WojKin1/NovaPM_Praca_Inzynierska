{% extends "base.html" %}

{% block title %}Zadania — NovaPM{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
    <div class="text-center">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-emerald-600 mb-6 shadow-lg">
            <svg class="w-9 h-9 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2
                         M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2
                         m-6 9l2 2 4-4"/>
            </svg>
        </div>
        <p class="text-xs font-semibold uppercase tracking-widest text-emerald-400 mb-2">
            {{ request.user.get_role_display }}
        </p>
        <h1 class="text-2xl font-bold text-white mb-2">
            Panel Developera&nbsp;/&nbsp;Testera
        </h1>
        <p class="text-gray-400 mb-8">
            Zalogowany jako <span class="text-emerald-400 font-medium">{{ request.user.username }}</span>
        </p>
        <a href="{% url 'user_profile' %}"
           class="text-xs text-gray-500 hover:text-gray-300 transition">Mój profil</a>
        <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit"
                    class="rounded-lg bg-gray-800 hover:bg-gray-700 border border-gray-700
                           px-5 py-2.5 text-sm font-medium text-gray-300
                           focus:outline-none focus:ring-2 focus:ring-gray-600
                           transition cursor-pointer">
                Wyloguj się
            </button>
        </form>
    </div>
</div>
{% endblock %}
