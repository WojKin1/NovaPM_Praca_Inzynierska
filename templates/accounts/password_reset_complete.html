{% extends "base.html" %}
{% block title %}Hasło zmienione — NovaPM{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md">

        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-indigo-600 mb-4 shadow-lg">
                <svg class="w-9 h-9 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                </svg>
            </div>
            <h1 class="text-3xl font-bold tracking-tight text-white">NovaPM</h1>
        </div>

        <div class="bg-gray-900 border border-gray-800 rounded-2xl shadow-2xl p-8 text-center">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-emerald-900/40 border border-emerald-700 mb-4">
                <svg class="w-6 h-6 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
            </div>
            <h2 class="text-lg font-semibold text-gray-200 mb-2">Hasło zostało zmienione</h2>
            <p class="text-sm text-gray-400 mb-6">
                Możesz teraz zalogować się używając nowego hasła.
            </p>
            <a href="{% url 'login' %}"
               class="inline-block rounded-lg bg-indigo-600 hover:bg-indigo-500 px-6 py-2.5 text-sm font-semibold text-white transition">
                Przejdź do logowania
            </a>
        </div>

        <p class="mt-6 text-center text-xs text-gray-600">&copy; 2025 NovaPM</p>
    </div>
</div>
{% endblock %}
